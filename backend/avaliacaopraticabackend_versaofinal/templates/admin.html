<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administração - Listar Questões</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div>
        <div>
            <h1>Gerenciar Questões</h1>
        </div>
        
        <div>
            <a href="/">Voltar ao Menu Principal</a> | 
            <a href="/admin/nova">Cadastrar Nova Questão</a>
        </div>

        <div style="margin-top: 20px;">
            <table border="1" style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr>
                        <th>Pergunta</th>
                        <th>Resposta Correta</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    {% for q in questoes %}
                    <tr>
                        <td style="padding: 8px;">{{ q.pergunta }}</td>
                        <td style="padding: 8px; text-align: center;">{{ q.resposta|upper }}</td>
                        <td style="padding: 8px; text-align: center;">
                            <a href="/admin/editar/{{ q.id }}">Editar</a> | 
                            <a href="/admin/excluir/{{ q.id }}" onclick="return confirm('Tem certeza?')">Excluir</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
