<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - RESERVAIF 2.0</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; border-radius: 15px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); padding: 50px 40px; max-width: 450px; width: 100%; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { color: #667eea; font-size: 28px; margin-bottom: 10px; }
        .header p { color: #999; font-size: 14px; }
        .form-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 10px; color: #333; font-weight: 600; font-size: 14px; }
        input[type="email"] { width: 100%; padding: 14px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; transition: all 0.3s; }
        input[type="email"]:focus { outline: none; border-color: #667eea; box-shadow: 0 0 10px rgba(102, 126, 234, 0.2); }
        .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; transition: transform 0.2s; }
        .btn:hover { transform: translateY(-2px); }
        .erro { background-color: #f8d7da; color: #721c24; padding: 12px; border-radius: 5px; margin-bottom: 20px; font-size: 14px; text-align: center; }
        .info { background-color: #d1ecf1; color: #0c5460; padding: 12px; border-radius: 5px; margin-bottom: 20px; font-size: 14px; }
        .link { text-align: center; margin-top: 20px; }
        .link a { color: #667eea; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔑 Recuperar Senha</h1>
            <p>Informe seu e-mail para recuperar o acesso</p>
        </div>
        {% if erro == 'email_nao_encontrado' %}
        <div class="erro">⚠️ E-mail não encontrado no sistema.</div>
        {% endif %}
        <div class="info">ℹ️ Digite o e-mail associado à sua conta para recuperar sua senha.</div>
        <form method="POST" action="/recuperar_senha/processar">
            <div class="form-group">
                <label for="email">📧 E-mail</label>
                <input type="email" id="email" name="email" required placeholder="seu@email.com">
            </div>
            <button type="submit" class="btn">🔓 Recuperar Acesso</button>
        </form>
        <div class="link">
            <a href="/login">← Voltar ao Login</a>
        </div>
    </div>
</body>
</html>
