<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - ReservaIF</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --if-green: #0F7B3C;
            --if-red: #C8102E;
            --if-light-green: #1FA64A;
            --text-dark: #333;
            --text-gray: #666;
            --border-color: #e0e0e0;
            --bg-light: #f8f9fa;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--if-green) 0%, var(--if-light-green) 50%, var(--if-red) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
            padding: 48px 40px;
            max-width: 420px;
            width: 100%;
        }
        
        .header {
            text-align: center;
            margin-bottom: 36px;
        }
        
        .header-icon {
            width: 56px;
            height: 56px;
            background: #e8f5e9;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 28px;
            color: var(--if-green);
        }
        
        .header h1 {
            color: var(--text-dark);
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .header p {
            color: var(--text-gray);
            font-size: 14px;
            line-height: 1.6;
        }
        
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }
        
        .alert-error {
            background: #ffebee;
            color: var(--if-red);
            border-left: 4px solid var(--if-red);
        }
        
        .alert-info {
            background: #e8f5e9;
            color: var(--if-green);
            border-left: 4px solid var(--if-green);
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-dark);
            font-weight: 600;
            font-size: 14px;
        }
        
        input[type="email"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
        }
        
        input[type="email"]:focus {
            outline: none;
            border-color: var(--if-green);
            box-shadow: 0 0 0 3px rgba(15, 123, 60, 0.1);
        }
        
        input[type="email"]::placeholder {
            color: #aaa;
        }
        
        .btn {
            width: 100%;
            padding: 12px 16px;
            background: var(--if-green);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn:hover {
            background: #0a5a2e;
            box-shadow: 0 4px 12px rgba(15, 123, 60, 0.3);
            transform: translateY(-1px);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--border-color);
        }
        
        .footer a {
            color: var(--if-green);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s ease;
        }
        
        .footer a:hover {
            color: var(--if-light-green);
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 32px 24px;
            }
            
            .header h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-icon">
                <i class="fas fa-key"></i>
            </div>
            <h1>Recuperar Senha</h1>
            <p>Informe seu e-mail para recuperar o acesso ao sistema</p>
        </div>
        
        {% if erro == 'email_nao_encontrado' %}
        <div class="alert alert-error">
            <i class="fas fa-exclamation-circle" style="flex-shrink: 0; margin-top: 2px;"></i>
            <span>E-mail não encontrado no sistema. Verifique e tente novamente.</span>
        </div>
        {% endif %}
        
        <div class="alert alert-info">
            <i class="fas fa-info-circle" style="flex-shrink: 0; margin-top: 2px;"></i>
            <span>Digite o e-mail associado à sua conta institucional para recuperar sua senha.</span>
        </div>
        
        <form method="POST" action="/recuperar_senha/processar">
            <div class="form-group">
                <label for="email">
                    <i class="fas fa-envelope" style="color: var(--if-green); margin-right: 6px;"></i>E-mail Institucional
                </label>
                <input type="email" id="email" name="email" required placeholder="seu@ifpi.edu.br">
            </div>
            
            <button type="submit" class="btn">
                <i class="fas fa-unlock"></i> Recuperar Acesso
            </button>
        </form>
        
        <div class="footer">
            <a href="/login">
                <i class="fas fa-arrow-left"></i> Voltar ao Login
            </a>
        </div>
    </div>
</body>
</html>
