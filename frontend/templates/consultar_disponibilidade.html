{% extends "base.html" %}

{% block title %}Consultar Disponibilidade - ReservaIF{% endblock %}

{% block content %}
<div class="section-header">
    <h2>Consultar Disponibilidade</h2>
</div>

<div class="card" style="max-width: 600px; margin: 0 auto;">
    <form action="/disponibilidade/filtrar" method="POST">
        <div class="form-group">
            <label for="data">Data da Consulta</label>
            <input type="date" name="data" id="data" required value="{{ data_atual if data_atual else '' }}">
        </div>

        <div class="grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="form-group">
                <label for="hora_inicio">Horário de Início</label>
                <input type="time" name="hora_inicio" id="hora_inicio" required>
            </div>
            <div class="form-group">
                <label for="hora_fim">Horário de Término</label>
                <input type="time" name="hora_fim" id="hora_fim" required>
            </div>
        </div>

        <div class="form-group">
            <label for="id_sala">Sala Específica (Opcional)</label>
            <select name="id_sala" id="id_sala">
                <option value="">Todas as Salas</option>
                {% for s in salas %}
                <option value="{{ s.id }}">{{ s.nome }}</option>
                {% endfor %}
            </select>
        </div>

        <div style="margin-top: 32px;">
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">
                <i class="fas fa-search"></i> Verificar Salas Livres
            </button>
        </div>
    </form>
</div>

<div style="margin-top: 40px; text-align: center; color: var(--text-gray);">
    <p style="font-size: 14px;">
        <i class="fas fa-info-circle"></i> O sistema cruzará os horários oficiais de aula com as reservas aprovadas para mostrar apenas o que está livre.
    </p>
</div>
{% endblock %}
