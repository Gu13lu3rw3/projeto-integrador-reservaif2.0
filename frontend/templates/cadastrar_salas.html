{% extends "base.html" %}

{% block title %}Cadastrar Sala - ReservaIF{% endblock %}

{% block content %}
<div class="section-header">
    <h2>Cadastrar Nova Sala</h2>
    <a href="/salas" class="btn btn-outline">
        <i class="fas fa-arrow-left"></i> Voltar
    </a>
</div>

<div class="card" style="max-width: 600px; margin: 0 auto;">
    <form action="/salas/salvar" method="POST">
        <div class="form-group">
            <label for="nome">Nome da Sala</label>
            <input type="text" name="nome" id="nome" required placeholder="Ex: Sala B2-01">
        </div>

        <div class="grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="form-group">
                <label for="capacidade">Capacidade (pessoas)</label>
                <input type="number" name="capacidade" id="capacidade" required min="1" placeholder="Ex: 40">
            </div>
            <div class="form-group">
                <label for="localizacao">Localização</label>
                <input type="text" name="localizacao" id="localizacao" required placeholder="Ex: Bloco B - Piso 2">
            </div>
        </div>

        <div style="margin-top: 32px;">
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">
                <i class="fas fa-save"></i> Cadastrar Sala
            </button>
        </div>
    </form>
</div>
{% endblock %}
