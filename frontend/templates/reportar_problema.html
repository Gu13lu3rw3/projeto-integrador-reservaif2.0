{% extends "base.html" %}

{% block title %}Reportar Problema - ReservaIF{% endblock %}

{% block content %}
<div class="section-header">
    <h2>Reportar Problema Técnico</h2>
    <a href="/problemas" class="btn btn-outline">
        <i class="fas fa-arrow-left"></i> Voltar
    </a>
</div>

<div class="card" style="max-width: 600px; margin: 0 auto;">
    <form action="/problemas/salvar" method="POST">
        <div class="form-group">
            <label for="id_sala">Selecione a Sala</label>
            <select name="id_sala" id="id_sala" required>
                {% for s in salas %}
                <option value="{{ s.id }}">{{ s.nome }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="prioridade">Gravidade do Problema</label>
            <select name="prioridade" id="prioridade" required>
                <option value="Baixa">Baixa (Não impede o uso)</option>
                <option value="Média">Média (Uso parcial)</option>
                <option value="Alta">Alta (Impossibilita o uso - BLOQUEIA SALA)</option>
            </select>
            <p style="font-size: 12px; color: var(--text-gray); margin-top: 4px;">
                * Problemas de alta gravidade bloqueiam a sala para novas reservas automaticamente.
            </p>
        </div>

        <div class="form-group">
            <label for="descricao">Descrição Detalhada</label>
            <textarea name="descricao" id="descricao" rows="5" required placeholder="Descreva o problema encontrado..."></textarea>
        </div>

        <div style="margin-top: 32px;">
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">
                Enviar Reporte de Manutenção
            </button>
        </div>
    </form>
</div>
{% endblock %}
